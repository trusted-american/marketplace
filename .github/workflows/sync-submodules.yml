name: Sync community submodules

on:
  schedule:
    # Every Monday at 6am UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  sync:
    name: Update community/claude submodule
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        # NOTE: don't pass `submodules: true` — actions/checkout's credential
        # persistence step runs `git submodule foreach --recursive` unconditionally,
        # which fails on community/claude's stray nested gitlink (no .gitmodules
        # entry). The script below initializes the submodule manually.

      - name: Pull latest upstream and open PR if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git submodule update --init --remote community/claude
          # Scrub stray nested gitlink (no .gitmodules entry) so checkout's
          # post-job `git submodule foreach --recursive` doesn't fail.
          git -C community/claude rm --cached -r --ignore-unmatch .claude/worktrees

          if git diff --quiet community/claude; then
            echo "Submodule already up to date"
            exit 0
          fi

          OLD=$(git diff community/claude | grep -oP '(?<=^-Subproject commit )\w+' || echo "unknown")
          NEW=$(git diff community/claude | grep -oP '(?<=^\+Subproject commit )\w+' || echo "unknown")

          BRANCH="chore/sync-community-claude-$(date +%s)"
          git checkout -b "$BRANCH"
          git add community/claude
          git commit -m "chore: sync community/claude submodule [skip ci]"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: sync community/claude submodule" \
            --body "$(cat <<EOF
          Updates \`community/claude\` submodule to latest upstream.

          - **Old:** \`${OLD:0:10}\`
          - **New:** \`${NEW:0:10}\`
          - **Upstream:** https://github.com/markus41/claude

          Once merged, the \`update-registry\` CI job will regenerate \`marketplace.json\` automatically.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
