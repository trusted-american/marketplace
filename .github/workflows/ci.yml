name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          exit_code=0

          for dir in plugins/*/ community/*/; do
            [ -d "$dir" ] || continue
            plugin_ok=0

            for file in README.md LICENSE; do
              if [ ! -f "$dir$file" ]; then
                echo "MISSING: $dir$file"
                exit_code=1
                plugin_ok=1
              fi
            done

            manifest="${dir}.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "MISSING: $manifest"
              exit_code=1
              plugin_ok=1
            else
              if ! python3 -c "import json, sys; d=json.load(open(sys.argv[1])); assert d.get('name'), 'missing name'" "$manifest" 2>/dev/null; then
                echo "INVALID: $manifest (missing or invalid 'name' field)"
                exit_code=1
                plugin_ok=1
              fi
            fi

            [ $plugin_ok -eq 0 ] && echo "OK: $dir"
          done

          exit $exit_code

  test:
    name: Test MCP server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: tools/marketplace-mcp
        run: npm ci

      - name: Run tests
        working-directory: tools/marketplace-mcp
        run: npm test
