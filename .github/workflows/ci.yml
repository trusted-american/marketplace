name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          exit_code=0

          for dir in plugins/*/ community/*/; do
            [ -d "$dir" ] || continue
            plugin_ok=0

            for file in README.md LICENSE; do
              if [ ! -f "$dir$file" ]; then
                echo "MISSING: $dir$file"
                exit_code=1
                plugin_ok=1
              fi
            done

            manifest="${dir}.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "MISSING: $manifest"
              exit_code=1
              plugin_ok=1
            else
              if ! python3 -c "import json, sys, re; d=json.load(open(sys.argv[1])); n=d.get('name',''); assert n and re.match(r'^[a-z0-9-]+$', n), 'name must be kebab-case'" "$manifest" 2>/dev/null; then
                echo "INVALID: $manifest (missing or non-kebab-case 'name' field)"
                exit_code=1
                plugin_ok=1
              fi
            fi

            [ $plugin_ok -eq 0 ] && echo "OK: $dir"
          done

          exit $exit_code

  test:
    name: Test MCP server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: tools/marketplace-mcp
        run: npm ci

      - name: Run tests
        working-directory: tools/marketplace-mcp
        run: npm test

  update-registry:
    name: Update .claude-plugin/marketplace.json
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate .claude-plugin/marketplace.json
        run: node tools/generate-marketplace-json.js

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: update marketplace.json [skip ci]"
          git push
