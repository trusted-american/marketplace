name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check required files
        run: |
          exit_code=0

          for dir in plugins/*/ community/*/; do
            [ -d "$dir" ] || continue
            # skip claude (submodule)
            [[ "$dir" == "community/claude/" ]] && continue
            plugin_ok=0

            for file in README.md LICENSE; do
              if [ ! -f "$dir$file" ]; then
                echo "MISSING: $dir$file"
                exit_code=1
                plugin_ok=1
              fi
            done

            manifest="${dir}.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "MISSING: $manifest"
              exit_code=1
              plugin_ok=1
            else
              if ! python3 -c "import json, sys, re; d=json.load(open(sys.argv[1])); n=d.get('name',''); assert n and re.match(r'^[a-z0-9-]+$', n), 'name must be kebab-case'" "$manifest" 2>/dev/null; then
                echo "INVALID: $manifest (missing or non-kebab-case 'name' field)"
                exit_code=1
                plugin_ok=1
              fi
            fi

            [ $plugin_ok -eq 0 ] && echo "OK: $dir"
          done

          exit $exit_code

  test:
    name: Test MCP server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: tools/marketplace-mcp
        run: npm ci

      - name: Run tests
        working-directory: tools/marketplace-mcp
        run: npm test

  verify-registry:
    name: Verify marketplace.json matches source
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Regenerate and verify marketplace.json plugins match
        run: |
          # Save committed plugin data (ignore metadata since lastUpdated changes every run)
          node -e "
            const d = require('./.claude-plugin/marketplace.json');
            delete d.metadata;
            console.log(JSON.stringify(d));
          " > /tmp/committed.json 2>/dev/null || echo '{}' > /tmp/committed.json

          # Regenerate
          node tools/generate-marketplace-json.js

          # Compare plugin data only
          node -e "
            const d = require('./.claude-plugin/marketplace.json');
            delete d.metadata;
            console.log(JSON.stringify(d));
          " > /tmp/generated.json

          if ! diff /tmp/committed.json /tmp/generated.json > /dev/null 2>&1; then
            echo "ERROR: .claude-plugin/marketplace.json is out of date or was manually edited."
            echo "Run 'node tools/generate-marketplace-json.js' and commit the result."
            diff /tmp/committed.json /tmp/generated.json || true
            exit 1
          fi
          echo "OK: marketplace.json matches plugin source data"

  update-registry:
    name: Update .claude-plugin/marketplace.json
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Generate .claude-plugin/marketplace.json
        run: node tools/generate-marketplace-json.js

      - name: Commit and push updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && exit 0

          git commit -m "chore: update marketplace.json [skip ci]"
          git push
